services:
  mongo:
    image: mongo:7
    container_name: sp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: sp_mongo_express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH: "false"

  form-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sp_form_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      FORM_API_HOST: "0.0.0.0"
      FORM_API_PORT: "5001"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: sp_agent
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      form-api:
        condition: service_started
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "5002"
      FORM_API_URL: http://form-api:5001

volumes:
  mongo_data:
