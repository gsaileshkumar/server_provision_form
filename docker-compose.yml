services:
  mongo:
    image: mongo:7
    container_name: sp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: sp_mongo_express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH: "false"

  form-api:
    build:
      # Root context so the multi-stage Dockerfile can see both backend/ and
      # frontend/. Stage 1 builds the SPA; stage 2 copies dist/ into Flask's
      # static folder.
      context: .
      dockerfile: backend/Dockerfile
    container_name: sp_form_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      FORM_API_HOST: "0.0.0.0"
      FORM_API_PORT: "5001"
      # Flask proxies /copilotkit/* here on-demand, so no startup dependency.
      COPILOTKIT_RUNTIME_URL: http://runtime:5003/copilotkit

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: sp_agent
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      form-api:
        condition: service_started
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      AGENT_HOST: "0.0.0.0"
      AGENT_PORT: "5002"
      FORM_API_URL: http://form-api:5001

  runtime:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sp_runtime
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_started
    # Port exposure optional — Flask reverse-proxies this service.
    expose:
      - "5003"
    environment:
      RUNTIME_HOST: "0.0.0.0"
      RUNTIME_PORT: "5003"
      PYTHON_AGENT_URL: http://agent:5002/agui/provisioning_agent

volumes:
  mongo_data:
